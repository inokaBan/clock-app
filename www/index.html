<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Clock</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clock">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- LANDSCAPE: single line + labels below -->
<div id="clock-wrap">
  <div id="clock-stage" class="clock-stage">
    <div id="clock-display">00:00</div>
  </div>
  <div id="landscape-labels">
    <span class="ls-lbl" id="ls-hr">hr</span>
    <span class="ls-lbl" id="ls-min">min</span>
    <span class="ls-lbl" id="ls-sec" style="display:none">sec</span>
  </div>
</div>

<!-- PORTRAIT: HR / divider / MIN / divider / SEC (optional) -->
<div id="portrait-wrap">
  <div class="p-label">hr</div>
  <div id="portrait-hr-stage" class="p-num-stage">
    <div class="p-num" id="portrait-hr">00</div>
  </div>
  <div id="portrait-divider"></div>
  <div class="p-label" id="portrait-min-label">min</div>
  <div class="p-num" id="portrait-min">00</div>
  <div id="portrait-sec-row">
    <div id="portrait-divider2"></div>
    <div class="p-label">sec</div>
    <div class="p-num" id="portrait-sec">00</div>
  </div>
</div>

<button id="settings-toggle" title="Customize">⚙️</button>

<div id="panel">
  <div id="panel-resize-grip" aria-hidden="true"></div>
  <div id="panel-header">
    <h2>Customize Clock</h2>
    <button id="panel-close" title="Close">✕</button>
  </div>
  <div id="panel-body">

    <div class="sec">Time Format</div>
    <div class="toggle-row">
      <button class="toggle-btn active" data-format="24">24h</button>
      <button class="toggle-btn" data-format="12">12h</button>
    </div>

    <div class="sec">Seconds</div>
    <div class="toggle-row">
      <button class="toggle-btn active" data-seconds="show">Show</button>
      <button class="toggle-btn" data-seconds="hide">Hide</button>
    </div>

    <div class="sec">Screensaver When Charging</div>
    <div class="toggle-row">
      <button class="toggle-btn" data-screensaver="on">On</button>
      <button class="toggle-btn active" data-screensaver="off">Off</button>
    </div>
    <div id="screensaver-hint" style="font-size:0.58rem;color:rgba(255,255,255,0.3);margin-top:0.4rem;line-height:1.5;display:none;">
      Clock stays on screen while charging.
    </div>

    <div class="sec">Orientation</div>
    <div class="toggle-row">
      <button class="toggle-btn active" data-orientation="auto">Auto</button>
      <button class="toggle-btn" data-orientation="portrait">Portrait</button>
      <button class="toggle-btn" data-orientation="landscape">Landscape</button>
    </div>
    <div id="orientation-hint" style="font-size:0.58rem;color:rgba(255,255,255,0.3);margin-top:0.4rem;line-height:1.5;">
      Force mode works best in installed app builds.
    </div>

    <div class="sec">Alarm</div>
    <div class="alarm-create-row">
      <input type="time" id="alarm-time-input" aria-label="Alarm time">
      <button id="alarm-add-btn" class="toggle-btn alarm-add-btn">Add Alarm</button>
    </div>
    <div class="alarm-defaults-row">
      <button class="toggle-btn alarm-default-btn" data-alarm-offset="5">+5m</button>
      <button class="toggle-btn alarm-default-btn" data-alarm-offset="10">+10m</button>
      <button class="toggle-btn alarm-default-btn" data-alarm-offset="30">+30m</button>
      <button class="toggle-btn alarm-default-btn" data-alarm-offset="60">+1h</button>
    </div>
    <div class="alarm-create-row alarm-ringtone-row">
      <select id="alarm-ringtone-select" aria-label="Alarm ringtone"></select>
      <label class="upload-label alarm-upload-label">
        <span>Upload ringtone</span>
        <input type="file" id="ringtone-upload" accept="audio/*,.mp3,.wav,.ogg,.m4a,.aac" multiple>
      </label>
    </div>
    <div id="alarm-list" class="alarm-list"></div>
    <div id="alarm-tap-hint" class="alarm-tap-hint">Tap anywhere on the clock to stop ringing.</div>

    <div class="sec">Font</div>
    <div class="font-grid" id="font-grid"></div>
    <div class="upload-area">
      <label class="upload-label">
        <span>⬆ Upload your own font (.ttf .otf .woff .woff2)</span>
        <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" multiple>
      </label>
      <div id="custom-fonts-list"></div>
    </div>

    <div class="sec">Size</div>
    <div class="slider-wrap">
      <input type="range" id="size-slider" min="5" max="98" value="18" step="1">
      <span class="slider-val" id="size-val">18</span>
    </div>

    <div class="sec">Text Color / Gradient</div>
    <div class="swatch-grid" id="gradient-grid"></div>
    <div class="color-row">
      <label>Custom solid color</label>
      <input type="color" id="custom-color" value="#ffffff">
    </div>

    <div class="sec">Background</div>
    <div class="swatch-grid" id="bg-grid"></div>
    <div class="color-row">
      <label>Custom solid color</label>
      <input type="color" id="custom-bg" value="#000000">
    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
