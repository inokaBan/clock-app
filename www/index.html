<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Clock</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clock">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --panel-w: 300px; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  display: flex; align-items: center; justify-content: center;
  transition: background 0.5s ease;
  background: #000;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}
#clock-wrap {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%; padding: 1rem;
}
#clock-display {
  text-align: center; line-height: 1; letter-spacing: 0.04em;
  max-width: 100%; overflow-wrap: break-word;
  transition: font-family 0.3s, color 0.3s;
}
#settings-toggle {
  position: fixed;
  bottom: max(1.5rem, env(safe-area-inset-bottom, 1.5rem));
  right: max(1.5rem, env(safe-area-inset-right, 1.5rem));
  width: 46px; height: 46px; border-radius: 50%;
  background: rgba(255,255,255,0.13);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.25);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  transition: background 0.2s, transform 0.2s, opacity 0.5s;
  z-index: 200; touch-action: manipulation;
}
#settings-toggle:hover { background: rgba(255,255,255,0.25); transform: scale(1.1); }
#settings-toggle.panel-open,
#settings-toggle.idle-hidden { opacity: 0; pointer-events: none; }

#panel {
  position: fixed; top: 0; right: 0;
  width: min(var(--panel-w), 100vw); height: 100%;
  overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch;
  background: rgba(8,8,12,0.93);
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  border-left: 1px solid rgba(255,255,255,0.07);
  padding: 0 0 2rem;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
  z-index: 199; color: #fff; font-family: monospace;
}
#panel.open { transform: translateX(0); }
#panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.2rem 1.2rem 0.8rem; position: sticky; top: 0;
  background: rgba(8,8,12,0.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  z-index: 1; border-bottom: 1px solid rgba(255,255,255,0.06);
}
#panel-header h2 {
  font-size: 0.58rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.35);
}
#panel-close {
  background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; color: rgba(255,255,255,0.65);
  font-size: 0.9rem; width: 30px; height: 30px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: background 0.15s; touch-action: manipulation;
}
#panel-close:hover { background: rgba(255,255,255,0.18); }
#panel-body { padding: 0 1.2rem; }
.sec {
  font-size: 0.53rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: rgba(255,255,255,0.28); margin: 1.2rem 0 0.5rem;
}
.toggle-row { display: flex; gap: 0.35rem; }
.toggle-btn {
  flex: 1; padding: 0.45rem 0.3rem;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 7px; color: rgba(255,255,255,0.65); font-size: 0.65rem;
  cursor: pointer; text-align: center;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  font-family: monospace; touch-action: manipulation;
}
.toggle-btn.active { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.5); color: #fff; }
.font-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.35rem; }
.font-btn {
  padding: 0.55rem 0.4rem;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 7px; color: rgba(255,255,255,0.75); font-size: 0.7rem;
  cursor: pointer; transition: background 0.15s, border-color 0.15s;
  text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  touch-action: manipulation;
}
.font-btn:hover { background: rgba(255,255,255,0.1); }
.font-btn.active { border-color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.14); color: #fff; }
.upload-area { margin-top: 0.5rem; display: flex; flex-direction: column; gap: 0.35rem; }
.upload-label {
  display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 0.7rem;
  background: rgba(255,255,255,0.04); border: 1px dashed rgba(255,255,255,0.2);
  border-radius: 7px; color: rgba(255,255,255,0.5); font-size: 0.63rem;
  cursor: pointer; transition: background 0.15s, border-color 0.15s, color 0.15s;
  font-family: monospace;
}
.upload-label:hover { background: rgba(255,255,255,0.09); border-color: rgba(255,255,255,0.35); color: #fff; }
.upload-label input[type=file] { display: none; }
#custom-fonts-list { display: flex; flex-direction: column; gap: 0.3rem; max-height: 130px; overflow-y: auto; }
.cfont-chip {
  display: flex; align-items: center; gap: 0.4rem; padding: 0.45rem 0.6rem;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 6px; font-size: 0.65rem; cursor: pointer;
  transition: background 0.15s; touch-action: manipulation;
}
.cfont-chip .chip-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cfont-chip .chip-preview { font-size: 1rem; color: rgba(255,255,255,0.5); padding-right: 0.2rem; }
.cfont-chip .chip-del {
  color: rgba(255,100,100,0.7); font-size: 0.75rem; flex-shrink: 0;
  background: none; border: none; cursor: pointer; padding: 0; line-height: 1;
}
.cfont-chip.active { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.12); }
.slider-wrap { display: flex; align-items: center; gap: 0.6rem; }
.slider-wrap input[type=range] {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 3px; border-radius: 2px; background: rgba(255,255,255,0.18);
  outline: none; cursor: pointer;
}
.slider-wrap input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px;
  border-radius: 50%; background: #fff; cursor: pointer;
}
.slider-wrap input[type=range]::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: #fff; cursor: pointer; border: none;
}
.slider-val { font-size: 0.62rem; color: rgba(255,255,255,0.42); width: 2rem; text-align: right; }
.swatch-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.35rem; }
.swatch {
  height: 34px; border-radius: 7px; cursor: pointer; border: 2px solid transparent;
  transition: border-color 0.15s, transform 0.15s; touch-action: manipulation;
}
.swatch:hover { transform: scale(1.07); }
.swatch.active { border-color: #fff; }
.color-row { display: flex; align-items: center; gap: 0.6rem; margin-top: 0.4rem; }
.color-row label { font-size: 0.62rem; color: rgba(255,255,255,0.4); flex: 1; }
.color-row input[type=color] {
  width: 30px; height: 30px; border: 1px solid rgba(255,255,255,0.15);
  background: none; cursor: pointer; border-radius: 6px; padding: 0;
}
#panel::-webkit-scrollbar { width: 3px; }
#panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
#custom-fonts-list::-webkit-scrollbar { width: 3px; }
#custom-fonts-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 2px; }
/* Screensaver mode — keep user's chosen background, just drift */
body.ss-active { cursor: none; }
body.ss-active #settings-toggle { display: none; }

@media (max-width: 380px) { :root { --panel-w: 100vw; } }
@media (min-width: 768px) { :root { --panel-w: 320px; } }
@media (max-height: 500px) and (orientation: landscape) {
  #panel-header { padding: 0.7rem 1rem 0.5rem; }
  #panel-body { padding: 0 1rem; }
  .sec { margin: 0.75rem 0 0.4rem; }
}
</style>
</head>
<body>

<div id="clock-wrap">
  <div id="clock-display">00:00:00</div>
</div>

<button id="settings-toggle" title="Customize">⚙️</button>

<div id="panel">
  <div id="panel-header">
    <h2>Customize Clock</h2>
    <button id="panel-close" title="Close">✕</button>
  </div>
  <div id="panel-body">

    <div class="sec">Time Format</div>
    <div class="toggle-row">
      <button class="toggle-btn active" data-format="24">24h</button>
      <button class="toggle-btn" data-format="12">12h AM/PM</button>
    </div>

    <div class="sec">Seconds</div>
    <div class="toggle-row">
      <button class="toggle-btn active" data-seconds="show">Show</button>
      <button class="toggle-btn" data-seconds="hide">Hide</button>
    </div>

    <div class="sec">Screensaver When Charging</div>
    <div class="toggle-row">
      <button class="toggle-btn" data-screensaver="on">On</button>
      <button class="toggle-btn active" data-screensaver="off">Off</button>
    </div>
    <div id="screensaver-hint" style="font-size:0.58rem;color:rgba(255,255,255,0.3);margin-top:0.4rem;line-height:1.5;display:none;">
      Clock will drift slowly around the screen while charging, keeping your chosen style, to prevent burn-in.
    </div>

    <div class="sec">Font</div>
    <div class="font-grid" id="font-grid"></div>
    <div class="upload-area">
      <label class="upload-label">
        <span>⬆ Upload your own font (.ttf .otf .woff .woff2)</span>
        <input type="file" id="font-upload" accept=".ttf,.otf,.woff,.woff2" multiple>
      </label>
      <div id="custom-fonts-list"></div>
    </div>

    <div class="sec">Size</div>
    <div class="slider-wrap">
      <input type="range" id="size-slider" min="5" max="98" value="18" step="1">
      <span class="slider-val" id="size-val">18</span>
    </div>

    <div class="sec">Text Color / Gradient</div>
    <div class="swatch-grid" id="gradient-grid"></div>
    <div class="color-row">
      <label>Custom solid color</label>
      <input type="color" id="custom-color" value="#ffffff">
    </div>

    <div class="sec">Background</div>
    <div class="swatch-grid" id="bg-grid"></div>
    <div class="color-row">
      <label>Custom solid color</label>
      <input type="color" id="custom-bg" value="#000000">
    </div>

  </div>
</div>

<script>
/* ── Fonts: 100% offline — system fonts available on every device ── */
const FONTS = [
  { label: 'System UI',    css: 'system-ui, sans-serif' },
  { label: 'Monospace',    css: 'ui-monospace, Menlo, "Courier New", monospace' },
  { label: 'Serif',        css: 'ui-serif, Georgia, "Times New Roman", serif' },
  { label: 'Rounded',      css: 'ui-rounded, "Hiragino Maru Gothic ProN", sans-serif' },
  { label: 'Arial',        css: 'Arial, Helvetica, sans-serif' },
  { label: 'Georgia',      css: 'Georgia, "Times New Roman", serif' },
  { label: 'Courier',      css: '"Courier New", Courier, monospace' },
  { label: 'Impact',       css: 'Impact, "Arial Narrow", sans-serif' },
  { label: 'Trebuchet',    css: '"Trebuchet MS", Helvetica, sans-serif' },
  { label: 'Palatino',     css: '"Palatino Linotype", Palatino, serif' },
];

const GRADIENTS = [
  { label: 'White',  css: '#ffffff' },
  { label: 'Gold',   css: 'linear-gradient(135deg,#f7d26a,#e8a000)' },
  { label: 'Neon',   css: 'linear-gradient(135deg,#00ffcc,#00b3ff)' },
  { label: 'Flame',  css: 'linear-gradient(135deg,#ff4e00,#ec9f05)' },
  { label: 'Rose',   css: 'linear-gradient(135deg,#f953c6,#b91d73)' },
  { label: 'Arctic', css: 'linear-gradient(135deg,#4facfe,#00f2fe)' },
  { label: 'Lime',   css: 'linear-gradient(135deg,#b8f400,#56e000)' },
  { label: 'Galaxy', css: 'linear-gradient(135deg,#c471ed,#f64f59,#12c2e9)' },
];

const BACKGROUNDS = [
  { label: 'Black',     css: '#000000' },
  { label: 'Deep Navy', css: '#050b1a' },
  { label: 'Slate',     css: '#0d1117' },
  { label: 'Charcoal',  css: '#1a1a1a' },
  { label: 'Night',     css: 'radial-gradient(ellipse at 20% 50%,#1a0533,#000)' },
  { label: 'Deep Sea',  css: 'radial-gradient(ellipse at 80% 20%,#001a2e,#000)' },
  { label: 'Forest',    css: 'linear-gradient(135deg,#0a1f0a,#001a00)' },
  { label: 'Ember',     css: 'radial-gradient(ellipse at 50% 80%,#2b0a00,#000)' },
  { label: 'Dusk',      css: 'linear-gradient(180deg,#0f0c29,#302b63,#24243e)' },
  { label: 'Ivory',     css: '#f5f0e8' },
  { label: 'Cloud',     css: 'linear-gradient(135deg,#e0eafc,#cfdef3)' },
  { label: 'Warm Gray', css: '#d6d0c4' },
];

/* ══════════════════════════════════════════
   STATE (defined first so loadState can merge into it)
══════════════════════════════════════════ */
const state = {
  font:        FONTS[0].css,
  size:        18,
  gradient:    GRADIENTS[0].css,
  bg:          BACKGROUNDS[0].css,
  format24:    true,
  showSeconds: true,
  screensaver: false,
};

/* ══════════════════════════════════════════
   PERSIST: save/load settings
   Uses localStorage — works on HTTPS and localhost
══════════════════════════════════════════ */
const STORAGE_KEY = 'clock-prefs-v1';

function saveState() {
  try {
    const data = JSON.stringify({
      font:        state.font,
      size:        state.size,
      gradient:    state.gradient,
      bg:          state.bg,
      format24:    state.format24,
      showSeconds: state.showSeconds,
      screensaver: state.screensaver,
    });
    localStorage.setItem(STORAGE_KEY, data);
  } catch(e) {
    console.warn('Clock: could not save settings', e);
  }
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const saved = JSON.parse(raw);
    // Merge saved values into state, keeping defaults for any missing keys
    Object.keys(state).forEach(k => {
      if (saved[k] !== undefined) state[k] = saved[k];
    });
  } catch(e) {
    console.warn('Clock: could not load settings', e);
  }
}

loadState(); // merge saved prefs into state right away

/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
const clockEl = document.getElementById('clock-display');

function tick() {
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const sec = state.showSeconds ? `:${s}` : '';
  if (state.format24) {
    clockEl.textContent = `${String(h).padStart(2,'0')}:${m}${sec}`;
  } else {
    const ampm = h >= 12 ? 'PM' : 'AM';
    h = h % 12 || 12;
    clockEl.textContent = `${String(h).padStart(2,'0')}:${m}${sec} ${ampm}`;
  }
}

/* ══════════════════════════════════════════
   APPLY STYLES
══════════════════════════════════════════ */
function applyFont()  { clockEl.style.fontFamily = state.font; }
function applySize()  { clockEl.style.fontSize = state.size + 'vmin'; }
function applyBg()    { document.body.style.background = ssActive ? '#000' : state.bg; }
function applyColor() {
  const css = state.gradient;
  const isGrad = css.startsWith('linear') || css.startsWith('radial');
  if (isGrad) {
    clockEl.style.background = css;
    clockEl.style.webkitBackgroundClip = 'text';
    clockEl.style.backgroundClip = 'text';
    clockEl.style.webkitTextFillColor = 'transparent';
    clockEl.style.color = '';
  } else {
    clockEl.style.background = 'none';
    clockEl.style.webkitBackgroundClip = '';
    clockEl.style.backgroundClip = '';
    clockEl.style.webkitTextFillColor = '';
    clockEl.style.color = css;
  }
}

function applyAll() { applyFont(); applySize(); applyColor(); applyBg(); }

/* ══════════════════════════════════════════
   RESTORE UI TO MATCH SAVED STATE
══════════════════════════════════════════ */
function restoreUI() {
  // Format
  document.querySelectorAll('[data-format]').forEach(b => {
    b.classList.toggle('active', (b.dataset.format === '24') === state.format24);
  });
  // Seconds
  document.querySelectorAll('[data-seconds]').forEach(b => {
    b.classList.toggle('active', (b.dataset.seconds === 'show') === state.showSeconds);
  });
  // Screensaver
  document.querySelectorAll('[data-screensaver]').forEach(b => {
    b.classList.toggle('active', (b.dataset.screensaver === 'on') === state.screensaver);
  });
  document.getElementById('screensaver-hint').style.display = state.screensaver ? 'block' : 'none';
  // Font buttons (built-in)
  document.querySelectorAll('.font-btn').forEach(b => {
    b.classList.toggle('active', b.style.fontFamily === state.font || b.dataset.css === state.font);
  });
  // Size slider
  const sizeSlider = document.getElementById('size-slider');
  sizeSlider.value = state.size;
  document.getElementById('size-val').textContent = state.size;
  // Gradient swatches — mark active if exact match
  document.querySelectorAll('#gradient-grid .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.css === state.gradient);
  });
  // Bg swatches
  document.querySelectorAll('#bg-grid .swatch').forEach(s => {
    s.classList.toggle('active', s.dataset.css === state.bg);
  });
}

/* ══════════════════════════════════════════
   FONT HELPERS
══════════════════════════════════════════ */
function allSelectables() { return document.querySelectorAll('.font-btn, .cfont-chip'); }
function selectFontBtn(btn) { allSelectables().forEach(b => b.classList.remove('active')); btn.classList.add('active'); }

/* ══════════════════════════════════════════
   TOGGLES
══════════════════════════════════════════ */
document.querySelectorAll('[data-format]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-format]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.format24 = btn.dataset.format === '24';
    tick(); saveState();
  });
});

document.querySelectorAll('[data-seconds]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-seconds]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.showSeconds = btn.dataset.seconds === 'show';
    tick(); saveState();
  });
});

document.querySelectorAll('[data-screensaver]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('[data-screensaver]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.screensaver = btn.dataset.screensaver === 'on';
    document.getElementById('screensaver-hint').style.display = state.screensaver ? 'block' : 'none';
    saveState();
    setupBattery();
  });
});

/* ══════════════════════════════════════════
   FONT GRID
══════════════════════════════════════════ */
const fontGrid = document.getElementById('font-grid');
FONTS.forEach((f, i) => {
  const btn = document.createElement('button');
  btn.className = 'font-btn' + (i === 0 ? ' active' : '');
  btn.textContent = f.label;
  btn.style.fontFamily = f.css;
  btn.dataset.css = f.css;
  btn.title = f.label;
  btn.addEventListener('click', () => {
    selectFontBtn(btn); state.font = f.css; applyFont(); saveState();
  });
  fontGrid.appendChild(btn);
});

/* ══════════════════════════════════════════
   CUSTOM FONT UPLOAD
══════════════════════════════════════════ */
const customFontsList = document.getElementById('custom-fonts-list');
document.getElementById('font-upload').addEventListener('change', (e) => {
  Array.from(e.target.files).forEach(file => {
    const rawName = file.name.replace(/\.[^.]+$/, '');
    const family  = 'CF_' + rawName.replace(/[^a-zA-Z0-9]/g, '_') + '_' + Date.now();
    const url     = URL.createObjectURL(file);
    const style   = document.createElement('style');
    style.textContent = `@font-face { font-family: "${family}"; src: url("${url}"); }`;
    document.head.appendChild(style);

    const chip = document.createElement('div');
    chip.className = 'cfont-chip';
    chip.dataset.family = family;

    const preview = document.createElement('span');
    preview.className = 'chip-preview';
    preview.style.fontFamily = family;
    preview.textContent = 'Aa';

    const nameSpan = document.createElement('span');
    nameSpan.className = 'chip-name';
    nameSpan.textContent = rawName;

    const delBtn = document.createElement('button');
    delBtn.className = 'chip-del';
    delBtn.textContent = '✕';
    delBtn.title = 'Remove font';
    delBtn.addEventListener('click', ev => {
      ev.stopPropagation();
      if (state.font === family) {
        state.font = FONTS[0].css; applyFont();
        allSelectables().forEach(b => b.classList.remove('active'));
        fontGrid.querySelector('.font-btn').classList.add('active');
        saveState();
      }
      URL.revokeObjectURL(url);
      chip.remove();
    });

    chip.append(preview, nameSpan, delBtn);
    chip.addEventListener('click', () => {
      selectFontBtn(chip); state.font = family; applyFont(); saveState();
    });
    customFontsList.appendChild(chip);
  });
  e.target.value = '';
});

/* ══════════════════════════════════════════
   SIZE SLIDER
══════════════════════════════════════════ */
const sizeSlider = document.getElementById('size-slider');
const sizeValEl  = document.getElementById('size-val');
sizeSlider.addEventListener('input', () => {
  state.size = Number(sizeSlider.value);
  sizeValEl.textContent = state.size;
  applySize(); saveState();
});

/* ══════════════════════════════════════════
   GRADIENT SWATCHES
══════════════════════════════════════════ */
const gradGrid = document.getElementById('gradient-grid');
GRADIENTS.forEach((g, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === 0 ? ' active' : '');
  sw.style.background = g.css;
  sw.dataset.css = g.css;
  sw.title = g.label;
  sw.addEventListener('click', () => {
    gradGrid.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active'); state.gradient = g.css; applyColor(); saveState();
  });
  gradGrid.appendChild(sw);
});
document.getElementById('custom-color').addEventListener('input', e => {
  gradGrid.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  state.gradient = e.target.value; applyColor(); saveState();
});

/* ══════════════════════════════════════════
   BACKGROUND SWATCHES
══════════════════════════════════════════ */
const bgGrid = document.getElementById('bg-grid');
BACKGROUNDS.forEach((b, i) => {
  const sw = document.createElement('div');
  sw.className = 'swatch' + (i === 0 ? ' active' : '');
  sw.style.background = b.css;
  sw.dataset.css = b.css;
  sw.title = b.label;
  sw.addEventListener('click', () => {
    bgGrid.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    sw.classList.add('active'); state.bg = b.css; applyBg(); saveState();
  });
  bgGrid.appendChild(sw);
});
document.getElementById('custom-bg').addEventListener('input', e => {
  bgGrid.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  state.bg = e.target.value; applyBg(); saveState();
});

/* ══════════════════════════════════════════
   PANEL + IDLE
══════════════════════════════════════════ */
const panel     = document.getElementById('panel');
const toggleBtn = document.getElementById('settings-toggle');
const closeBtn  = document.getElementById('panel-close');
const IDLE_MS   = 3000;
let idleTimer   = null;

function scheduleHide() {
  clearTimeout(idleTimer);
  if (panel.classList.contains('open')) return;
  idleTimer = setTimeout(() => {
    if (!panel.classList.contains('open')) toggleBtn.classList.add('idle-hidden');
  }, IDLE_MS);
}
function onActivity() {
  if (ssActive) exitScreensaver();
  toggleBtn.classList.remove('idle-hidden');
  scheduleHide();
}
['pointermove','pointerdown','keydown','touchstart'].forEach(evt => {
  document.addEventListener(evt, onActivity, { passive: true });
});

const openPanel = () => {
  clearTimeout(idleTimer);
  toggleBtn.classList.remove('idle-hidden');
  panel.classList.add('open');
  toggleBtn.classList.add('panel-open');
};
const closePanelFn = () => {
  panel.classList.remove('open');
  toggleBtn.classList.remove('panel-open');
  scheduleHide();
};

toggleBtn.addEventListener('click', openPanel);
closeBtn.addEventListener('click', closePanelFn);
document.addEventListener('pointerdown', e => {
  if (panel.classList.contains('open') && !panel.contains(e.target) && e.target !== toggleBtn) closePanelFn();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanelFn(); });
scheduleHide();

window.addEventListener('resize', () => { applySize(); if (ssActive) positionSS(); }, { passive: true });

/* ══════════════════════════════════════════
   SCREENSAVER
   - Activates when charging + screensaver setting is ON
   - Clock drifts slowly around screen (prevents burn-in)
   - Any touch/tap exits it
══════════════════════════════════════════ */
let ssActive = false;

function enterScreensaver() {
  if (ssActive) return;
  ssActive = true;
  document.body.classList.add('ss-active');
  applyBg();
  // Hide gear button
  toggleBtn.classList.add('idle-hidden');
}

function exitScreensaver() {
  if (!ssActive) return;
  ssActive = false;
  document.body.classList.remove('ss-active');
  applyBg();
}

/* Battery API — detect charging, works on Android Chrome/Brave over HTTPS */
let batteryRef = null;

function onChargingChange() {
  if (!batteryRef) return;
  if (state.screensaver && batteryRef.charging) {
    enterScreensaver();
  } else {
    exitScreensaver();
  }
}

function setupBattery() {
  if (!('getBattery' in navigator)) {
    console.log('Clock: Battery API not supported on this device/browser');
    return;
  }
  navigator.getBattery().then(battery => {
    batteryRef = battery;
    // Remove old listener first to avoid duplicates
    battery.removeEventListener('chargingchange', onChargingChange);
    battery.addEventListener('chargingchange', onChargingChange);
    // Check current charging state immediately
    onChargingChange();
    console.log('Clock: Battery API ready, charging =', battery.charging);
  }).catch(e => {
    console.warn('Clock: Battery API failed', e);
  });
}

/* ══════════════════════════════════════════
   WAKE LOCK
══════════════════════════════════════════ */
let wakeLock = null;
async function requestWakeLock() {
  if (!('wakeLock' in navigator)) return;
  try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') requestWakeLock();
});
requestWakeLock();

/* ══════════════════════════════════════════
   FULLSCREEN
══════════════════════════════════════════ */
async function requestFullscreen() {
  const el = document.documentElement;
  try {
    if      (el.requestFullscreen)       await el.requestFullscreen({ navigationUI: 'hide' });
    else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
  } catch(e) {}
}
document.getElementById('clock-wrap').addEventListener('click', e => {
  if (!panel.classList.contains('open') && e.target !== toggleBtn) {
    if (!document.fullscreenElement && !document.webkitFullscreenElement) {
      requestFullscreen();
    }
  }
});
window.addEventListener('load', () => { setTimeout(requestFullscreen, 300); });

/* ══════════════════════════════════════════
   SERVICE WORKER
══════════════════════════════════════════ */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
applyAll();
restoreUI();
setupBattery();
tick();
setInterval(tick, 1000);
</script>
